name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../whetstone-${{ matrix.target }}.tar.gz whetstone
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whetstone-${{ matrix.target }}
          path: whetstone-${{ matrix.target }}.tar.gz

  assets:
    name: Package assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package assets
        run: tar czf whetstone-assets.tar.gz -C assets .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: whetstone-assets
          path: whetstone-assets.tar.gz

  release:
    name: Create Release
    needs: [build, assets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: whetstone-*.tar.gz
